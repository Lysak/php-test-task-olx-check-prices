services:
  app:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    pull_policy: missing
    container_name: php-test-task-olx-check-prices_app_${CURRENT_BRANCH:-prod}
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ../:/var/www
      - ../storage:/var/www/storage
      - ../public:/var/www/public
    entrypoint: [ "/var/docker/entrypoint.sh" ]
    depends_on:
      - mariadb
      - redis
    networks:
      - php-test-task-olx-check-prices_network
    env_file:
        - ../.env

  webserver:
    build:
      context: ../
      dockerfile: docker/nginx/Dockerfile
    pull_policy: missing
    container_name: php-test-task-olx-check-prices_nginx_${CURRENT_BRANCH:-prod}
    restart: unless-stopped
    ports:
      - '${FORWARD_APP_PORT:-80}:80'
    volumes:
      - '../public:/var/www/public'
    depends_on:
      - app
    networks:
      - php-test-task-olx-check-prices_network
    env_file:
        - ../.env

  mariadb:
    build:
      context: ../
      dockerfile: docker/mariadb/Dockerfile
    pull_policy: missing
    container_name: php-test-task-olx-check-prices_mariadb_${CURRENT_BRANCH:-prod}
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 'no'
    healthcheck:
      test: [
        "CMD",
        "healthcheck.sh",
        "--connect",
        "--innodb_initialized"
      ]
      retries: 3
      timeout: 5s
      interval: 10s
      start_period: 30s
    ports:
      - '${FORWARD_DB_PORT:-3306}:3306'
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - php-test-task-olx-check-prices_network
    env_file:
        - ../.env

  redis:
    image: redis:alpine
    pull_policy: missing
    container_name: php-test-task-olx-check-prices_redis_${CURRENT_BRANCH:-prod}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      retries: 3
      timeout: 5s
      interval: 10s
      start_period: 30s
    volumes:
      - redis_data:/data
    networks:
      - php-test-task-olx-check-prices_network
    env_file:
        - ../.env

  sftp:
    image: atmoz/sftp:alpine
    pull_policy: missing
    platform: linux/amd64
    container_name: php-test-task-olx-check-prices_sftp_logs_${CURRENT_BRANCH:-prod}
    restart: unless-stopped
    ports:
      - "${FORWARD_SFTP_PORT:-2222}:22"
    volumes:
      - logs_data:/home/${SFTP_USER}/logs:rw
    networks:
      - php-test-task-olx-check-prices_network
    environment:
      - SFTP_USERS=${SFTP_USER}:${SFTP_PASS}:1001
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    env_file:
        - ../.env

  mailpit:
    image: axllent/mailpit:latest
    pull_policy: missing
    container_name: php-test-task-olx-check-prices_mailpit_${CURRENT_BRANCH:-prod}
    restart: unless-stopped
    ports:
      - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
      - '${FORWARD_MAILPIT_SMTP_PORT:-1025}:1025'
    networks:
      - php-test-task-olx-check-prices_network

networks:
  php-test-task-olx-check-prices_network:
    driver: bridge

volumes:
  mariadb_data:
  redis_data:
  logs_data:
  storage:
